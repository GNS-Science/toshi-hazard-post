[coverage:run]
# uncomment the following to omit files during running
#omit =
[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    def main
    if TYPE_CHECKING:

[tox:tox]
isolated_build = true
envlist = py310, py311, py312, format, lint, build-linux, build-macos
requires =
    tox-uv

[gh-actions]
python =
    3.10: py310, format, lint, build
    3.11: py311
    3.12: py312

[testenv]
runner = uv-venv-lock-runner
allowlist_externals = pytest
dependency_groups = dev
passenv = *
setenv =
    PYTHONPATH = {toxinidir}
    PYTHONWARNINGS = ignore
commands =
    pytest --cov=toshi_hazard_post --cov-branch --cov-report=xml --cov-report=term-missing tests

[testenv:format]
runner = uv-venv-lock-runner
dependency_groups = dev
commands =
    ruff format toshi_hazard_post tests

[testenv:lint]
runner = uv-venv-lock-runner
dependency_groups = dev
commands =
    ruff check toshi_hazard_post tests
    mypy toshi_hazard_post tests

[testenv:build-linux]
runner = uv-venv-lock-runner
platform = linux
dependency_groups =
    dev
    doc
commands =
    uv build

[testenv:build-macos]
runner = uv-venv-lock-runner
platform = darwin
dependency_groups =
    dev
    doc
commands =
    uv build
