[mypy]
ignore_missing_imports = True

[coverage:run]
# uncomment the following to omit files during running
#omit =
[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    def main
    if TYPE_CHECKING:

[tox:tox]
isolated_build = true
requires = tox-uv
envlist = py310, py311, py312, format, lint, build-linux, build-macos

[gh-actions]
python =
    3.10: py310, format, lint, build
    3.11: py311
    3.12: py312

[testenv]
allowlist_externals = pytest
dependency_groups =
    dev
passenv = *
setenv =
    PYTHONPATH = {toxinidir}
    PYTHONWARNINGS = ignore
commands =
    pytest --cov=toshi_hazard_post --cov-branch --cov-report=xml --cov-report=term-missing tests

[testenv:format]
allowlist_externals =
    ruff
dependency_groups =
    dev
commands =
    ruff format toshi_hazard_post tests

[testenv:lint]
allowlist_externals =
    ruff
    mypy
dependency_groups =
    dev
commands =
    ruff check toshi_hazard_post tests
    mypy toshi_hazard_post tests

[testenv:build-linux]
platform = linux
allowlist_externals =
    mkdocs
    twine
    uv
dependency_groups =
    doc
    dev
commands =
    uv build

[testenv:build-macos]
platform = darwin
allowlist_externals =
    mkdocs
    twine
    uv
dependency_groups =
    doc
    dev
commands =
    uv build